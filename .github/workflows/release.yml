name: Release Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to publish
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      EXPO_NO_TELEMETRY: 1
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Generate Android project
        run: npx expo prebuild --platform android --no-install --clean

      - name: Build release APK
        working-directory: android
        run: |
          set -euo pipefail
          chmod +x gradlew
          for attempt in 1 2; do
            echo "Gradle build attempt ${attempt}"
            if ./gradlew :app:assembleRelease --no-daemon --stacktrace 2>&1 | tee "../gradle-build-attempt-${attempt}.log"; then
              exit 0
            fi
            if [ "$attempt" = "2" ]; then
              exit 1
            fi
            sleep 20
          done

      - name: Upload Gradle logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sub2api-mobile-gradle-logs
          path: gradle-build-attempt-*.log
          if-no-files-found: ignore

      - name: Collect APK
        run: |
          set -euo pipefail
          mkdir -p dist
          apk_path="$(find android/app/build/outputs/apk/release -type f -name '*.apk' | head -n 1)"
          if [ -z "$apk_path" ]; then
            echo "No release APK found."
            exit 1
          fi
          cp "$apk_path" "dist/sub2api-mobile-${RELEASE_TAG}-android.apk"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sub2api-mobile-android-apk
          path: dist/*.apk
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build-android
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sub2api-mobile-android-apk
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
